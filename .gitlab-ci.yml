
include:
  - project: "GNOME/citemplates"
    file: "templates/default-rules.yml"
  - project: "GNOME/citemplates"
    file: "flatpak/flatpak_ci_initiative.yml"
  - project: 'GNOME/citemplates'
    file: 'templates/basic-release.yml'

.vars-devel:
  variables:
    MANIFEST_PATH: "build-aux/com.belmoussaoui.Authenticator.Devel.json"
    FLATPAK_MODULE: "authenticator"
    APP_ID: "com.belmoussaoui.Authenticator.Devel"
    RUNTIME_REPO: "https://nightly.gnome.org/gnome-nightly.flatpakrepo"
    BUNDLE: "authenticator-nightly.flatpak"

stages:
  - build
  - publish
  - deploy

# Build Flatpak for x86_64
build-flatpak:
  extends: ['.flatpak@x86_64', '.vars-devel']
  stage: build

# Build Flatpak for aarch64
build-flatpak-aarch64:
  extends: ['.flatpak@aarch64', '.vars-devel']
  stage: build

nightly@x86_64:
  extends: '.publish_nightly'
  needs: ['build-flatpak']

nightly@aarch64:
  extends: '.publish_nightly'
  needs: ['build-flatpak-aarch64']

rustfmt:
  image: "rust:slim"
  stage: ".pre"
  script:
    - rustup component add rustfmt
    - echo -e "" >> src/config.rs
    - rustc -Vv && cargo -Vv
    - cargo fmt --version
    - cargo fmt --all -- --color=always --check

.flatpak-command: &flatpak-command
  extends: ['.vars-devel']
  stage: build
  image: '${RUNTIME_IMAGE}'
  tags:
    - flatpak
  script:
    - flatpak-builder --user --disable-rofiles-fuse --keep-build-dirs --stop-at=${FLATPAK_MODULE} flatpak_app ${MANIFEST_PATH}
    - flatpak build-finish --share=network flatpak_app
    - echo "cd .. && ${COMMAND}" | flatpak-builder --user --disable-rofiles-fuse --build-shell=${FLATPAK_MODULE} flatpak_app ${MANIFEST_PATH}

cargo-clippy:
  <<: *flatpak-command
  variables:
    COMMAND: "cargo clippy --all-targets --workspace --all-features -- -D warnings"

cargo-test:
  <<: *flatpak-command
  variables:
    COMMAND: "cargo test --workspace --all-features --all-targets"

pages:
  <<: *flatpak-command
  variables:
    COMMAND: "cargo doc --package=favicon-scrapper --package=authenticator --all-features --no-deps --document-private-items"
  after_script:
    - mv .flatpak-builder/build/${FLATPAK_MODULE}/target/doc public
    - chmod -R a=rwx public
  artifacts:
    paths:
      - 'public'
  only:
    refs:
      - master
